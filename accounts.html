    <script>
        // === YOUR APPS SCRIPT URL ===
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx6hTdcE5hP6GcMZm3c2Iu4larvrmyozW_R1FlG-SoJBsSarXYhXGr-Br3K7dIZk6VQ/exec';
        
        let currentUser = null;
        let employees = [];
        let sites = [];
        
        // Check if user is logged in
        const userStr = localStorage.getItem('user');
        if (!userStr) {
            window.location.href = 'index.html';
        }
        currentUser = JSON.parse(userStr);
        console.log("Logged in as:", currentUser);
        
        // Load all data when page loads
        async function loadAllData() {
            await loadEmployees();
            await loadSites();
            await loadDashboard();
        }
        
        async function loadEmployees() {
            try {
                const url = `${APPS_SCRIPT_URL}?action=getEmployees&username=${currentUser.username}&password=${currentUser.password}`;
                console.log("Fetching employees from:", url);
                
                const response = await fetch(url);
                const data = await response.json();
                console.log("Employees response:", data);
                
                if (data.success) {
                    employees = data.employees;
                    populateEmployeeDropdowns();
                    return true;
                } else {
                    console.error("Failed to load employees:", data.message);
                    return false;
                }
            } catch (error) {
                console.error("Error loading employees:", error);
                return false;
            }
        }
        
        function populateEmployeeDropdowns() {
            const dropdowns = ['advanceEmployeeId', 'expenseEmployeeId', 'salaryEmployeeId'];
            
            dropdowns.forEach(id => {
                const select = document.getElementById(id);
                if (select) {
                    select.innerHTML = '<option value="">Select Employee</option>';
                    employees.forEach(emp => {
                        const option = document.createElement('option');
                        option.value = emp.id;
                        option.textContent = `${emp.name} (${emp.site}) - Salary: ${emp.salary}`;
                        select.appendChild(option);
                    });
                }
            });
        }
        
        async function loadSites() {
            try {
                const url = `${APPS_SCRIPT_URL}?action=getSites`;
                console.log("Fetching sites from:", url);
                
                const response = await fetch(url);
                const data = await response.json();
                console.log("Sites response:", data);
                
                if (data.success) {
                    sites = data.sites;
                    const siteSelects = ['advanceSite', 'expenseSite', 'salarySite', 'employeeSite'];
                    
                    siteSelects.forEach(id => {
                        const select = document.getElementById(id);
                        if (select) {
                            select.innerHTML = '<option value="">Select Site</option>';
                            sites.forEach(site => {
                                const option = document.createElement('option');
                                option.value = site;
                                option.textContent = site;
                                select.appendChild(option);
                            });
                        }
                    });
                    return true;
                } else {
                    console.error("Failed to load sites");
                    return false;
                }
            } catch (error) {
                console.error("Error loading sites:", error);
                return false;
            }
        }
        
        async function loadDashboard() {
            try {
                const url = `${APPS_SCRIPT_URL}?action=getDashboardData&username=${currentUser.username}&password=${currentUser.password}`;
                console.log("Fetching dashboard from:", url);
                
                const response = await fetch(url);
                const data = await response.json();
                console.log("Dashboard response:", data);
                
                if (data.success && data.outstandingEmployees) {
                    const container = document.getElementById('outstandingList');
                    if (data.outstandingEmployees.length === 0) {
                        container.innerHTML = '<p>No outstanding dues</p>';
                    } else {
                        container.innerHTML = data.outstandingEmployees.map(emp => `
                            <div class="dues-item">
                                <span><strong>${emp.name}</strong> (${emp.site})</span>
                                <span style="color: #e53935;">${emp.dues} SAR</span>
                            </div>
                        `).join('');
                    }
                } else {
                    document.getElementById('outstandingList').innerHTML = '<p>No data available</p>';
                }
            } catch (error) {
                console.error("Error loading dashboard:", error);
                document.getElementById('outstandingList').innerHTML = '<p>Error loading data. Check console.</p>';
            }
        }
        
        // Add Advance Form
        document.getElementById('advanceForm')?.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const employeeId = document.getElementById('advanceEmployeeId').value;
            const employee = employees.find(e => e.id == employeeId);
            
            const data = {
                action: 'addAdvance',
                username: currentUser.username,
                password: currentUser.password,
                employeeId: employeeId,
                employeeName: employee?.name,
                site: document.getElementById('advanceSite').value,
                amount: parseFloat(document.getElementById('advanceAmount').value),
                notes: document.getElementById('advanceNotes').value
            };
            
            try {
                const response = await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data)
                });
                const result = await response.json();
                
                const msgDiv = document.getElementById('advanceMessage');
                if (result.success) {
                    msgDiv.className = 'message success';
                    msgDiv.textContent = result.message;
                    document.getElementById('advanceForm').reset();
                    loadDashboard();
                } else {
                    msgDiv.className = 'message error';
                    msgDiv.textContent = result.message;
                }
                
                setTimeout(() => {
                    msgDiv.className = 'message';
                }, 3000);
            } catch (error) {
                console.error("Error:", error);
                const msgDiv = document.getElementById('advanceMessage');
                msgDiv.className = 'message error';
                msgDiv.textContent = 'Network error: ' + error.message;
            }
        });
        
        // Add Expense Form
        document.getElementById('expenseForm')?.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const employeeId = document.getElementById('expenseEmployeeId').value;
            const employee = employees.find(e => e.id == employeeId);
            
            const data = {
                action: 'addExpense',
                username: currentUser.username,
                password: currentUser.password,
                employeeId: employeeId,
                employeeName: employee?.name,
                site: document.getElementById('expenseSite').value,
                amount: parseFloat(document.getElementById('expenseAmount').value),
                notes: document.getElementById('expenseNotes').value
            };
            
            try {
                const response = await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data)
                });
                const result = await response.json();
                
                const msgDiv = document.getElementById('expenseMessage');
                if (result.success) {
                    msgDiv.className = 'message success';
                    msgDiv.textContent = result.message;
                    document.getElementById('expenseForm').reset();
                    loadDashboard();
                } else {
                    msgDiv.className = 'message error';
                    msgDiv.textContent = result.message;
                }
                
                setTimeout(() => {
                    msgDiv.className = 'message';
                }, 3000);
            } catch (error) {
                console.error("Error:", error);
                const msgDiv = document.getElementById('expenseMessage');
                msgDiv.className = 'message error';
                msgDiv.textContent = 'Network error: ' + error.message;
            }
        });
        
        // Salary Payment Form
        document.getElementById('salaryForm')?.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const employeeId = document.getElementById('salaryEmployeeId').value;
            const employee = employees.find(e => e.id == employeeId);
            
            const data = {
                action: 'addSalaryPayment',
                username: currentUser.username,
                password: currentUser.password,
                employeeId: employeeId,
                employeeName: employee?.name,
                site: document.getElementById('salarySite').value,
                amountPaid: parseFloat(document.getElementById('salaryAmount').value),
                duesBefore: 0
            };
            
            try {
                const response = await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data)
                });
                const result = await response.json();
                
                const msgDiv = document.getElementById('salaryMessage');
                if (result.success) {
                    msgDiv.className = 'message success';
                    msgDiv.textContent = result.message;
                    document.getElementById('salaryForm').reset();
                    loadDashboard();
                } else {
                    msgDiv.className = 'message error';
                    msgDiv.textContent = result.message;
                }
                
                setTimeout(() => {
                    msgDiv.className = 'message';
                }, 3000);
            } catch (error) {
                console.error("Error:", error);
                const msgDiv = document.getElementById('salaryMessage');
                msgDiv.className = 'message error';
                msgDiv.textContent = 'Network error: ' + error.message;
            }
        });
        
        // Add Employee Form
        document.getElementById('employeeForm')?.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const data = {
                action: 'addEmployee',
                username: currentUser.username,
                password: currentUser.password,
                name: document.getElementById('employeeName').value,
                iqamaNo: document.getElementById('employeeIqama').value,
                site: document.getElementById('employeeSite').value,
                salary: parseFloat(document.getElementById('employeeSalary').value)
            };
            
            try {
                const response = await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data)
                });
                const result = await response.json();
                
                const msgDiv = document.getElementById('employeeMessage');
                if (result.success) {
                    msgDiv.className = 'message success';
                    msgDiv.textContent = `${result.message}. Employee ID: ${result.employeeId}`;
                    document.getElementById('employeeForm').reset();
                    loadEmployees();
                } else {
                    msgDiv.className = 'message error';
                    msgDiv.textContent = result.message;
                }
                
                setTimeout(() => {
                    msgDiv.className = 'message';
                }, 3000);
            } catch (error) {
                console.error("Error:", error);
                const msgDiv = document.getElementById('employeeMessage');
                msgDiv.className = 'message error';
                msgDiv.textContent = 'Network error: ' + error.message;
            }
        });
        
        async function runMonthEnd() {
            if (!confirm('WARNING: This will close the current month and archive all data. Are you sure?')) {
                return;
            }
            
            const data = {
                action: 'runMonthEnd',
                username: currentUser.username,
                password: currentUser.password
            };
            
            try {
                const response = await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data)
                });
                const result = await response.json();
                
                const msgDiv = document.getElementById('monthEndMessage');
                if (result.success) {
                    msgDiv.className = 'message success';
                    msgDiv.textContent = result.message;
                    loadDashboard();
                } else {
                    msgDiv.className = 'message error';
                    msgDiv.textContent = result.message;
                }
                
                setTimeout(() => {
                    msgDiv.className = 'message';
                }, 3000);
            } catch (error) {
                console.error("Error:", error);
                const msgDiv = document.getElementById('monthEndMessage');
                msgDiv.className = 'message error';
                msgDiv.textContent = 'Network error: ' + error.message;
            }
        }
        
        function exportToCSV() {
            const outstanding = document.querySelectorAll('.dues-item');
            let csv = 'Employee,Site,Dues (SAR)\n';
            outstanding.forEach(item => {
                const text = item.innerText;
                const parts = text.split('SAR');
                csv += `${parts[0].trim()},${parts[1] || ''}\n`;
            });
            
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `outstanding_dues_${new Date().toISOString().split('T')[0]}.csv`;
            a.click();
            URL.revokeObjectURL(url);
        }
        
        function showTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelectorAll('.tab').forEach(tab => {
                tab.classList.remove('active');
            });
            
            document.getElementById(`tab-${tabName}`).classList.add('active');
            event.target.classList.add('active');
        }
        
        function logout() {
            localStorage.removeItem('user');
            window.location.href = 'index.html';
        }
        
        // Start loading data
        loadAllData();
    </script>
